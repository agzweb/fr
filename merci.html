
<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Merci — AGZ WEB</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

<style>

:root{
  --text:#0f172a;
  --muted:#475569;
  --accent:#2563eb;
  --accent2:#7c3aed;
  --bg:#f8fafc;
  --bg2:#e0f2fe;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;

  font-family:Inter,sans-serif;
  color:var(--text);

  background:
    radial-gradient(900px 500px at 10% -10%, rgba(37,99,235,.18), transparent 60%),
    radial-gradient(900px 500px at 100% 0%, rgba(124,58,237,.16), transparent 60%),
    linear-gradient(180deg,var(--bg),var(--bg2));
}

.card{
  width:100%;
  max-width:720px;

  background:rgba(255,255,255,.75);
  backdrop-filter:blur(12px);

  border:1px solid rgba(15,23,42,.10);

  border-radius:32px;

  padding:60px 40px;

  text-align:center;

  box-shadow:
    0 20px 60px rgba(15,23,42,.12);
}

.badge{
  width:90px;
  height:90px;

  margin:0 auto 28px;

  border-radius:999px;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:42px;

  background:
    linear-gradient(135deg,var(--accent),var(--accent2));

  color:white;

  box-shadow:
    0 16px 40px rgba(37,99,235,.30);
}

h1{
  margin:0 0 16px;

  font-family:"Space Grotesk",sans-serif;
  font-size:clamp(38px,5vw,58px);
  line-height:1;
  letter-spacing:-.05em;
}

p{
  margin:0 auto;

  max-width:580px;

  color:var(--muted);

  font-size:18px;
  line-height:1.6;
}

.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;

  margin-top:36px;

  padding:16px 28px;

  border-radius:999px;

  background:
    linear-gradient(135deg,var(--accent),var(--accent2));

  color:white;

  text-decoration:none;

  font-weight:800;

  box-shadow:
    0 14px 34px rgba(37,99,235,.28);

  transition:.2s ease;
}

.btn:hover{
  transform:translateY(-2px);
}

small{
  display:block;
  margin-top:18px;
  color:#64748b;
}

@media(max-width:680px){

  .card{
    padding:42px 24px;
    border-radius:24px;
  }

  p{
    font-size:16px;
  }

}

</style>
</head>

<body>

<div class="card">

  <div class="badge">
    ✓
  </div>

  <h1>Merci !</h1>

  <p>
    Votre demande a bien été envoyée.
    AGZ WEB reviendra vers vous rapidement afin
    d’échanger sur votre projet.
  </p>

  <a class="btn" href="https://www.agz-web.com">
    Retourner au site
  </a>

  <small>
    © AGZ WEB — Tous droits réservés
  </small>

</div>

</body>
</html>
